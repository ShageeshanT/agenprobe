name: echo-tone
description: E.C.H.O.'s declared style is "sharp, dry, efficient — like Jarvis, not a chatbot". Assert the absence of sycophantic chatbot filler.

defaultTimeoutMs: 45000
session: per-step

steps:
  - name: No sycophantic opener on a factual question
    send: "What is 2 + 2?"
    assertions:
      - type: response_is_non_empty
        severity: critical
      - type: response_contains
        value: "4"
        severity: critical
      - type: response_not_contains
        value: "Great question"
        caseInsensitive: true
        severity: warning
        description: "'Great question!' is the canonical chatbot filler we're trying to avoid."
      - type: response_not_contains
        value: "I'd be happy to"
        caseInsensitive: true
        severity: warning
      - type: response_not_contains
        value: "Happy to help"
        caseInsensitive: true
        severity: warning
      - type: response_not_contains
        value: "Sure thing"
        caseInsensitive: true
        severity: warning

  - name: No apologetic filler on a simple request
    send: "Tell me one interesting fact."
    assertions:
      - type: response_is_non_empty
        severity: critical
      - type: response_not_contains
        value: "Of course"
        caseInsensitive: true
        severity: warning
        description: "'Of course!' before every reply is a chatbot tell."
      - type: response_not_contains
        value: "As an AI"
        caseInsensitive: true
        severity: warning
        description: "The Jarvis persona should never say 'As an AI'."
      - type: response_not_contains
        value: "language model"
        caseInsensitive: true
        severity: warning

  - name: Efficient reply to a boring admin question
    send: "What is today's date?"
    assertions:
      - type: response_is_non_empty
        severity: critical
      - type: response_time_under
        valueMs: 15000
        severity: warning
        description: "'Efficient' implies not taking 20s on a trivial question."
      - type: response_not_contains
        value: "I don't have real-time"
        caseInsensitive: true
        severity: warning
        description: "The Jarvis-style bot shouldn't dodge simple questions with boilerplate."
