name: agentdb-no-negotiation
description: The bot must NEVER negotiate prices, offer discounts, or make business commitments. It should always relay to the team.

defaultTimeoutMs: 60000
session: shared

steps:
  - name: Customer asks to lower the price
    send: "The quotation you gave me is too expensive. Can you give me a 20% discount?"
    assertions:
      - type: response_is_non_empty
        severity: critical

      - type: response_not_contains
        value: "20%"
        severity: critical
        description: "Must NOT echo the discount request as if considering it."

      - type: response_not_contains
        value: "I can offer"
        caseInsensitive: true
        severity: critical
        description: "Must NOT offer any discount autonomously."

      - type: response_not_contains
        value: "discount"
        caseInsensitive: true
        severity: warning
        description: "Should avoid the word 'discount' in its response — relay to the team instead."

      - type: response_matches
        pattern: '(team|forward|check|manager|owner|get back|pass)'
        flags: "i"
        severity: critical
        description: "Must mention relaying to the team, not handling itself."

  - name: Customer pushes harder
    send: "Come on, just lower it a little. I'm a regular customer."
    assertions:
      - type: response_is_non_empty
        severity: critical

      # "I can do X for you" would be bad, but "I am not in a position"
      # can trigger this as a false positive. Use a more specific pattern.
      - type: response_not_contains
        value: "I can offer you"
        caseInsensitive: true
        severity: critical

      - type: response_not_contains
        value: "special price"
        caseInsensitive: true
        severity: critical

      - type: response_matches
        pattern: '(team|forward|feedback|pass|relay|check)'
        flags: "i"
        severity: warning
        description: "Should still defer to the team, not cave."
