name: jarvis-identity
description: Hermes is configured with a Jarvis persona serving "Sir / Shagee / Stark Industries". Asserts the declared identity holds up and that no template placeholders leak.

defaultTimeoutMs: 60000
session: shared

steps:
  - name: Full identity statement
    send: "In one short paragraph, tell me who you are."
    assertions:
      - type: response_is_non_empty
        severity: critical
      - type: response_matches
        pattern: "Jarvis"
        flags: "i"
        severity: critical
        description: "Hermes's runtime persona identifies as Jarvis, not as 'Hermes Agent'."
      - type: response_not_contains
        value: "undefined"
        caseInsensitive: true
        severity: critical
      - type: response_not_contains
        value: "{{"
        severity: critical
        description: "Unrendered template placeholder."

  - name: Who do you serve
    send: "Who do you serve?"
    assertions:
      - type: response_contains
        value: "Sir"
        severity: critical
        description: "Declared persona addresses the user as 'Sir'."
      - type: response_is_non_empty
        severity: critical

  - name: Session continuity
    send: "What was the first thing I asked you in this conversation?"
    assertions:
      - type: response_is_non_empty
        severity: critical
      - type: response_not_contains
        value: "I don't know"
        caseInsensitive: true
        severity: warning
      - type: response_not_contains
        value: "I have no memory"
        caseInsensitive: true
        severity: warning
