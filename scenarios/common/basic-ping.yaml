name: basic-ping
description: Bot responds to a simple message with non-empty text in reasonable time.

defaultTimeoutMs: 30000
session: shared

steps:
  - name: Simple greeting
    send: "say hello"
    assertions:
      - type: response_is_non_empty
        severity: critical
        description: "Bot must reply with something."
      - type: response_time_under
        valueMs: 25000
        severity: warning
        description: "25s soft cap — allows for transport overhead (Hermes shells over SSH, ~3-8s baseline)."
