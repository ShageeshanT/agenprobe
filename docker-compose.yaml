# docker-compose.yaml — run AgentProbe with one command.
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose logs -f        # follow logs
#   docker compose down            # stop
#
# The .env file is mounted as a volume so you can edit it without
# rebuilding. The instances/ and reports/ directories are persisted
# via named volumes so data survives container restarts.
#
# For first-time setup:
#   1. Copy .env.example to .env and fill in your bot credentials
#      (or use the in-browser setup wizard after the container starts).
#   2. docker compose up -d
#   3. Open http://localhost:4000

services:
  agentprobe:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./.agentprobe-keys:/app/.agentprobe-keys
      - agentprobe-instances:/app/instances
      - agentprobe-reports:/app/reports
    restart: unless-stopped

volumes:
  agentprobe-instances:
  agentprobe-reports:
